openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ScreenCrew API - friend-group screen sharing app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: rooms
    description: Friend group rooms
  - name: messages
    description: Chat messages
  - name: users
    description: User management
  - name: friends
    description: Friend requests and friendships
  - name: blocks
    description: Blocked users
  - name: bots
    description: Room bots and incoming webhooks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
        "403":
          description: Registration not permitted (closed, server full, or invalid invite)

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with existing credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /quick-calls:
    post:
      operationId: createQuickCall
      tags: [rooms]
      summary: Create an account-free temporary Quick Call
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuickCallInput"
      responses:
        "201":
          description: Quick Call created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickCallSession"
        "429":
          description: Too many Quick Call requests

  /quick-calls/join:
    post:
      operationId: joinQuickCall
      tags: [rooms]
      summary: Join an account-free temporary Quick Call
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinQuickCallInput"
      responses:
        "200":
          description: Joined Quick Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickCallSession"
        "404":
          description: Quick Call not found or expired
        "429":
          description: Too many Quick Call requests

  /admin/claim:
    post:
      operationId: claimAdmin
      tags: [admin]
      summary: Become admin by presenting the server's configured admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimAdminInput"
      responses:
        "200":
          description: Admin granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Admin password not configured or incorrect

  /server-info:
    get:
      operationId: getServerInfo
      tags: [server]
      summary: Public server info (name and registration policy)
      security: []
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"

  /ice-servers:
    get:
      operationId: getIceServers
      tags: [server]
      summary: WebRTC ICE servers (STUN/TURN) for authenticated peers. May include TURN credentials.
      responses:
        "200":
          description: ICE server list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IceServerList"
        "401":
          description: Unauthorized

  /admin/config:
    get:
      operationId: getServerConfig
      tags: [admin]
      summary: Get server configuration (admin only)
      responses:
        "200":
          description: Server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigInfo"
        "403":
          description: Forbidden
    patch:
      operationId: updateServerConfig
      tags: [admin]
      summary: Update server configuration (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfigUpdate"
      responses:
        "200":
          description: Updated server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfigInfo"
        "400":
          description: Invalid request
        "403":
          description: Forbidden

  /admin/invites:
    get:
      operationId: listInvites
      tags: [admin]
      summary: List server invite keys (admin only)
      responses:
        "200":
          description: Invite keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerInvite"
        "403":
          description: Forbidden
    post:
      operationId: createInvite
      tags: [admin]
      summary: Create a server invite key (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteInput"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInvite"
        "403":
          description: Forbidden

  /admin/invites/{id}:
    delete:
      operationId: revokeInvite
      tags: [admin]
      summary: Revoke a server invite key (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked
        "403":
          description: Forbidden
        "404":
          description: Not found

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms for current user
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Created room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{roomId}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room by ID
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Rename a room (any member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomInput"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Not a member

  /rooms/{roomId}/leave:
    post:
      operationId: leaveRoom
      tags: [rooms]
      summary: Leave a room (removes current user from member list)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Successfully left

  /rooms/{roomId}/join:
    post:
      operationId: joinRoom
      tags: [rooms]
      summary: Join a room by invite code
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Invalid invite code

  /rooms/join-by-code:
    post:
      operationId: joinRoomByCode
      tags: [rooms]
      summary: Join a room using invite code without knowing room ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinByCodeInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
        "403":
          description: Invalid invite code

  /preset-rooms:
    get:
      operationId: listPresetRooms
      tags: [rooms]
      summary: List server preset rooms anyone can join
      responses:
        "200":
          description: List of preset rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresetRoom"

  /preset-rooms/{roomId}/join:
    post:
      operationId: joinPresetRoom
      tags: [rooms]
      summary: Join a preset room (no invite code required)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Not joinable
        "404":
          description: Room not found

  /admin/preset-rooms:
    post:
      operationId: createPresetRoom
      tags: [rooms]
      summary: Create a preset room (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetRoomInput"
      responses:
        "201":
          description: Created preset room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Admin only

  /admin/preset-rooms/{roomId}:
    delete:
      operationId: deletePresetRoom
      tags: [rooms]
      summary: Delete a preset room (admin only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Admin only
        "404":
          description: Room not found

  /rooms/{roomId}/members:
    get:
      operationId: getRoomMembers
      tags: [rooms]
      summary: Get members of a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberUser"

  /rooms/{roomId}/presence:
    get:
      operationId: getRoomPresence
      tags: [rooms]
      summary: Get live presence state for all members (online, speaking, streaming)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Presence snapshot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceEntry"

  /rooms/{roomId}/messages:
    get:
      operationId: getRoomMessages
      tags: [messages]
      summary: Get recent messages in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: channelId
          in: query
          required: false
          schema:
            type: integer
          description: Filter messages to a specific channel
        - name: before
          in: query
          required: false
          schema:
            type: integer
          description: Fetch messages with ID less than this value (cursor pagination)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /rooms/{roomId}/messages/search:
    get:
      operationId: searchRoomMessages
      tags: [messages]
      summary: Search messages across a room's history
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query (matched against message content)
        - name: channelId
          in: query
          required: false
          schema:
            type: integer
          description: Restrict results to a specific channel
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 40
      responses:
        "200":
          description: Matching messages, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /link-preview:
    get:
      operationId: getLinkPreview
      tags: [messages]
      summary: Fetch Open Graph link preview metadata for a URL
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
          description: The http(s) URL to unfurl
      responses:
        "200":
          description: Link preview metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPreview"

  /rooms/{roomId}/messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a message (owner only, within 15 minutes)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageInput"
      responses:
        "200":
          description: Edited message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the message owner or edit window expired
        "404":
          description: Message not found
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message (owner only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the message owner
        "404":
          description: Message not found

  /rooms/{roomId}/messages/{messageId}/reactions:
    post:
      operationId: toggleReaction
      tags: [messages]
      summary: Toggle an emoji reaction on a message (add if absent, remove if present)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Updated reactions for the message
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reaction"
        "403":
          description: Not a member of this room
        "404":
          description: Message not found

  /rooms/{roomId}/messages/{messageId}/pin:
    post:
      operationId: togglePin
      tags: [messages]
      summary: Pin or unpin a message (any member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not a member of this room
        "404":
          description: Message not found

  /rooms/{roomId}/pins:
    get:
      operationId: getPinnedMessages
      tags: [messages]
      summary: Get pinned messages in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pinned messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /rooms/{roomId}/pending:
    get:
      operationId: getPendingMembers
      tags: [rooms]
      summary: Get users waiting to join a private room (knock requests)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pending members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberUser"

  /rooms/{roomId}/members/{userId}/approve:
    post:
      operationId: approveMember
      tags: [rooms]
      summary: Approve a pending knock request (any active member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Approved
        "403":
          description: Not a member of this room
        "404":
          description: Pending request not found

  /rooms/{roomId}/channels:
    get:
      operationId: getChannels
      tags: [channels]
      summary: List channels in a room (private channels only for staff)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      operationId: createChannel
      tags: [channels]
      summary: Create a channel (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelInput"
      responses:
        "201":
          description: Created channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "403":
          description: Insufficient permissions

  /rooms/{roomId}/channels/{channelId}:
    patch:
      operationId: updateChannel
      tags: [channels]
      summary: Update a channel (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelInput"
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "403":
          description: Insufficient permissions
        "404":
          description: Channel not found
    delete:
      operationId: deleteChannel
      tags: [channels]
      summary: Delete a channel (owner/mod only; cannot delete last channel)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Insufficient permissions
        "404":
          description: Channel not found
        "409":
          description: Cannot delete the last channel

  /rooms/{roomId}/members/{userId}/role:
    patch:
      operationId: updateMemberRole
      tags: [rooms]
      summary: Change a member's role (owner only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleInput"
      responses:
        "204":
          description: Role updated
        "403":
          description: Insufficient permissions
        "404":
          description: Member not found

  /rooms/{roomId}/members/{userId}/deny:
    post:
      operationId: denyMember
      tags: [rooms]
      summary: Deny a pending knock request (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Denied
        "403":
          description: Insufficient permissions
        "404":
          description: Pending request not found

  /rooms/{roomId}/members/{userId}:
    delete:
      operationId: removeMember
      tags: [rooms]
      summary: Remove (kick) an active member (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "403":
          description: Insufficient permissions
        "404":
          description: Member not found

  /rooms/{roomId}/members/{userId}/ban:
    post:
      operationId: banMember
      tags: [rooms]
      summary: Ban a user from the room (owner/mod only); removes membership and blocks rejoining
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanMemberInput"
      responses:
        "204":
          description: Banned
        "403":
          description: Insufficient permissions
        "404":
          description: User not found

  /rooms/{roomId}/bans:
    get:
      operationId: getBans
      tags: [rooms]
      summary: List banned users (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of banned users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BannedUser"
        "403":
          description: Insufficient permissions

  /rooms/{roomId}/bans/{userId}:
    delete:
      operationId: unbanMember
      tags: [rooms]
      summary: Lift a ban (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unbanned
        "403":
          description: Insufficient permissions
        "404":
          description: Ban not found

  /giphy/search:
    get:
      operationId: searchGiphy
      tags: [giphy]
      summary: Search Giphy for GIFs (proxied server-side; falls back to trending when q is empty)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query; if empty or omitted, trending GIFs are returned
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 18
      responses:
        "200":
          description: List of matching GIFs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiphyGif"
        "503":
          description: Giphy is not configured on the server

  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List accepted friends
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /friends/requests:
    get:
      operationId: listFriendRequests
      tags: [friends]
      summary: List pending incoming and outgoing friend requests
      responses:
        "200":
          description: Pending friend requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequests"
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request by username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFriendInput"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          description: Invalid request
        "404":
          description: User not found
        "409":
          description: Already friends or request exists

  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept an incoming friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Accepted
        "404":
          description: Request not found

  /friends/requests/{id}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      summary: Decline an incoming friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Declined
        "404":
          description: Request not found

  /friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove a friend or cancel a sent request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /blocks:
    get:
      operationId: listBlocks
      tags: [blocks]
      summary: List blocked users
      responses:
        "200":
          description: List of blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"
    post:
      operationId: blockUser
      tags: [blocks]
      summary: Block a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockInput"
      responses:
        "204":
          description: Blocked
        "400":
          description: Invalid request

  /blocks/{userId}:
    delete:
      operationId: unblockUser
      tags: [blocks]
      summary: Unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unblocked

  /rooms/{roomId}/bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List bots in a room (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
        "403":
          description: Insufficient permissions
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a bot and get its webhook token (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotInput"
      responses:
        "201":
          description: Bot created (token shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotCreated"
        "403":
          description: Insufficient permissions

  /rooms/{roomId}/bots/{botId}:
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot (owner/mod only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Insufficient permissions
        "404":
          description: Bot not found

  /rooms/{roomId}/bots/{botId}/webhook:
    post:
      operationId: postBotMessage
      tags: [bots]
      summary: Post a message via a bot webhook token (no auth)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotWebhookInput"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Invalid token
        "404":
          description: Bot not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GiphyGif:
      type: object
      required: [id, url, previewUrl, width, height]
      properties:
        id:
          type: string
        url:
          type: string
          description: Full GIF URL (fixed height) suitable for posting and display
        previewUrl:
          type: string
          description: Smaller GIF URL used for the picker thumbnail
        title:
          type: string
        width:
          type: integer
        height:
          type: integer

    AuthInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 4

    RegisterInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 4
        inviteKey:
          type: string
          nullable: true
          description: Required when the server registration mode is "invite".

    CreateQuickCallInput:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 32

    JoinQuickCallInput:
      type: object
      required: [displayName, inviteCode]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 32
        inviteCode:
          type: string
          minLength: 4
          maxLength: 16

    QuickCallSession:
      type: object
      required: [token, room, user]
      properties:
        token:
          type: string
        room:
          $ref: "#/components/schemas/Room"
        user:
          $ref: "#/components/schemas/User"

    IceServer:
      type: object
      required: [urls]
      properties:
        urls:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        username:
          type: string
        credential:
          type: string

    ServerInfo:
      type: object
      required: [serverName, registration, userCount]
      properties:
        serverName:
          type: string
        description:
          type: string
          nullable: true
        registration:
          type: string
          enum: [open, invite, closed]
        userCount:
          type: integer

    IceServerList:
      type: object
      required: [iceServers]
      properties:
        iceServers:
          type: array
          items:
            $ref: "#/components/schemas/IceServer"

    ServerConfigInfo:
      type: object
      required: [serverName, registration, maxUsers, userCount]
      properties:
        serverName:
          type: string
        description:
          type: string
          nullable: true
        registration:
          type: string
          enum: [open, invite, closed]
        maxUsers:
          type: integer
        userCount:
          type: integer

    ServerConfigUpdate:
      type: object
      properties:
        serverName:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        registration:
          type: string
          enum: [open, invite, closed]
        maxUsers:
          type: integer
          minimum: 1

    ServerInvite:
      type: object
      required: [id, key, createdBy, uses, createdAt]
      properties:
        id:
          type: integer
        key:
          type: string
        createdBy:
          type: integer
        maxUses:
          type: integer
          nullable: true
        uses:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateInviteInput:
      type: object
      properties:
        maxUses:
          type: integer
          minimum: 1
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ClaimAdminInput:
      type: object
      required: [adminPassword]
      properties:
        adminPassword:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, isAdmin, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PublicUser:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    MemberUser:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        role:
          type: string
          enum: [owner, mod, member]
          nullable: true
        isBot:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    UpdateProfileInput:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
          maxLength: 40
        email:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
          maxLength: 9
        avatarStyle:
          type: string
          nullable: true
          enum: [initials, pixel]

    Room:
      type: object
      required: [id, name, inviteCode, createdAt, memberCount]
      properties:
        id:
          type: integer
        name:
          type: string
        inviteCode:
          type: string
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        createdBy:
          type: integer
        voiceMembers:
          type: array
          items:
            $ref: "#/components/schemas/VoiceMember"
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        themeColor:
          type: string
          nullable: true
        themeSkin:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isPrivate:
          type: boolean
          nullable: true
        inviteExpiresAt:
          type: string
          format: date-time
          nullable: true
        ephemeral:
          type: boolean
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        hasPassword:
          type: boolean
          nullable: true
        preset:
          type: boolean
          nullable: true
        pending:
          type: boolean
          nullable: true

    PresetRoom:
      type: object
      required: [id, name, memberCount, joined, hasText, hasVoice]
      properties:
        id:
          type: integer
        name:
          type: string
        memberCount:
          type: integer
        joined:
          type: boolean
        hasText:
          type: boolean
        hasVoice:
          type: boolean

    PresetRoomInput:
      type: object
      required: [name, kind]
      properties:
        name:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [text, voice, text_voice]

    RoomInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        isPrivate:
          type: boolean
        ephemeral:
          type: boolean
          nullable: true
          description: When true, the room auto-expires after a period of inactivity. Defaults to the server's configured behavior.

    UpdateRoomInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        themeColor:
          type: string
          nullable: true
        themeSkin:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isPrivate:
          type: boolean
        inviteExpiresAt:
          type: string
          format: date-time
          nullable: true
        regenerateCode:
          type: boolean
        password:
          type: string
          nullable: true

    JoinRoomInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
        password:
          type: string

    JoinByCodeInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
        password:
          type: string

    VoiceMember:
      type: object
      required: [userId, username]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        channelId:
          type: integer
          nullable: true

    PresenceEntry:
      type: object
      required: [userId, username, online, speaking, streaming, inVoice]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        online:
          type: boolean
        speaking:
          type: boolean
        streaming:
          type: boolean
        inVoice:
          type: boolean
        channelId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [online, away, dnd]
          nullable: true
        statusMessage:
          type: string
          nullable: true

    Reaction:
      type: object
