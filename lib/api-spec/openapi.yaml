openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ScreenCrew API - friend-group screen sharing app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: rooms
    description: Friend group rooms
  - name: messages
    description: Chat messages
  - name: users
    description: User management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with existing credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms for current user
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Created room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{roomId}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room by ID
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Rename a room (any member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomInput"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Not a member

  /rooms/{roomId}/leave:
    post:
      operationId: leaveRoom
      tags: [rooms]
      summary: Leave a room (removes current user from member list)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Successfully left

  /rooms/{roomId}/join:
    post:
      operationId: joinRoom
      tags: [rooms]
      summary: Join a room by invite code
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "403":
          description: Invalid invite code

  /rooms/join-by-code:
    post:
      operationId: joinRoomByCode
      tags: [rooms]
      summary: Join a room using invite code without knowing room ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinByCodeInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
        "403":
          description: Invalid invite code

  /rooms/{roomId}/members:
    get:
      operationId: getRoomMembers
      tags: [rooms]
      summary: Get members of a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberUser"

  /rooms/{roomId}/presence:
    get:
      operationId: getRoomPresence
      tags: [rooms]
      summary: Get live presence state for all members (online, speaking, streaming)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Presence snapshot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceEntry"

  /rooms/{roomId}/messages:
    get:
      operationId: getRoomMessages
      tags: [messages]
      summary: Get recent messages in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          required: false
          schema:
            type: integer
          description: Fetch messages with ID less than this value (cursor pagination)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /rooms/{roomId}/messages/{messageId}:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a message (owner only, within 15 minutes)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageInput"
      responses:
        "200":
          description: Edited message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the message owner or edit window expired
        "404":
          description: Message not found
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message (owner only)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the message owner
        "404":
          description: Message not found

  /rooms/{roomId}/messages/{messageId}/reactions:
    post:
      operationId: toggleReaction
      tags: [messages]
      summary: Toggle an emoji reaction on a message (add if absent, remove if present)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Updated reactions for the message
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reaction"
        "403":
          description: Not a member of this room
        "404":
          description: Message not found

  /rooms/{roomId}/messages/{messageId}/pin:
    post:
      operationId: togglePin
      tags: [messages]
      summary: Pin or unpin a message (any member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not a member of this room
        "404":
          description: Message not found

  /rooms/{roomId}/pins:
    get:
      operationId: getPinnedMessages
      tags: [messages]
      summary: Get pinned messages in a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pinned messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /rooms/{roomId}/pending:
    get:
      operationId: getPendingMembers
      tags: [rooms]
      summary: Get users waiting to join a private room (knock requests)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pending members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberUser"

  /rooms/{roomId}/members/{userId}/approve:
    post:
      operationId: approveMember
      tags: [rooms]
      summary: Approve a pending knock request (any active member)
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Approved
        "403":
          description: Not a member of this room
        "404":
          description: Pending request not found

  /giphy/search:
    get:
      operationId: searchGiphy
      tags: [giphy]
      summary: Search Giphy for GIFs (proxied server-side; falls back to trending when q is empty)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query; if empty or omitted, trending GIFs are returned
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 18
      responses:
        "200":
          description: List of matching GIFs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiphyGif"
        "503":
          description: Giphy is not configured on the server

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GiphyGif:
      type: object
      required: [id, url, previewUrl, width, height]
      properties:
        id:
          type: string
        url:
          type: string
          description: Full GIF URL (fixed height) suitable for posting and display
        previewUrl:
          type: string
          description: Smaller GIF URL used for the picker thumbnail
        title:
          type: string
        width:
          type: integer
        height:
          type: integer

    AuthInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 4

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PublicUser:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    MemberUser:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    UpdateProfileInput:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
          maxLength: 40
        email:
          type: string
          nullable: true
        steamUrl:
          type: string
          nullable: true
        discordUrl:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
          maxLength: 9
        avatarStyle:
          type: string
          nullable: true
          enum: [initials, pixel]

    Room:
      type: object
      required: [id, name, inviteCode, createdAt, memberCount]
      properties:
        id:
          type: integer
        name:
          type: string
        inviteCode:
          type: string
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        createdBy:
          type: integer
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        themeColor:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isPrivate:
          type: boolean
          nullable: true
        inviteExpiresAt:
          type: string
          format: date-time
          nullable: true
        pending:
          type: boolean
          nullable: true

    RoomInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        isPrivate:
          type: boolean

    UpdateRoomInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        themeColor:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isPrivate:
          type: boolean
        inviteExpiresAt:
          type: string
          format: date-time
          nullable: true
        regenerateCode:
          type: boolean

    JoinRoomInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    JoinByCodeInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    PresenceEntry:
      type: object
      required: [userId, username, online, speaking, streaming, inVoice]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        online:
          type: boolean
        speaking:
          type: boolean
        streaming:
          type: boolean
        inVoice:
          type: boolean
        status:
          type: string
          enum: [online, away, dnd]
          nullable: true
        statusMessage:
          type: string
          nullable: true

    Reaction:
      type: object
      required: [emoji, count, userIds]
      properties:
        emoji:
          type: string
        count:
          type: integer
        userIds:
          type: array
          items:
            type: integer

    Message:
      type: object
      required: [id, roomId, userId, username, content, createdAt, reactions]
      properties:
        id:
          type: integer
        roomId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nameColor:
          type: string
          nullable: true
        avatarStyle:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          nullable: true
        pinned:
          type: boolean
          nullable: true
        replyToId:
          type: integer
          nullable: true
        replyToContent:
          type: string
          nullable: true
        replyToUsername:
          type: string
          nullable: true
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/Reaction"

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        replyToId:
          type: integer
          nullable: true

    EditMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
