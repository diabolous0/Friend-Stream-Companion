    Bot:
      type: object
      required: [id, roomId, userId, name, createdAt]
      properties:
        id:
          type: integer
        roomId:
          type: integer
        userId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateBotInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40

    BotCreated:
      type: object
      required: [bot, token, webhookUrl]
      properties:
        bot:
          $ref: "#/components/schemas/Bot"
        token:
          type: string
        webhookUrl:
          type: string

    BotWebhookInput:
      type: object
      required: [token, content]
      properties:
        token:
          type: string
        content:
          type: string
          minLength: 1
        channelId:
          type: integer
          nullable: true
